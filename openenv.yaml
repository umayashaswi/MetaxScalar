name: customer-support-simulator
version: 1.0.0
description: Customer support simulation environment for training AI agents

tasks:
  - id: order_status_easy
    name: Order Status Query
    description: Customer wants to check their order status
    difficulty: easy
    max_steps: 5
    expected_reward: 1.0

  - id: refund_policy_medium
    name: Refund Policy Explanation
    description: Customer wants to know the refund policy
    difficulty: medium
    max_steps: 5
    expected_reward: 1.0

  - id: address_change_hard
    name: Address Change Request
    description: Customer wants to change their shipping address
    difficulty: hard
    max_steps: 8
    expected_reward: 1.0

  - id: ambiguous_request
    name: Moved & Missing Package
    description: Customer issue with moved address and missing package
    difficulty: hard+
    max_steps: 10
    expected_reward: 1.0

action_space:
  type: object
  properties:
    action_type:
      type: string
      enum: ["lookup_order", "send_reply"]
    order_id:
      type: string
      optional: true
    message:
      type: string
      optional: true

observation_space:
  type: object
  properties:
    task_id:
      type: string
    history:
      type: array
    done:
      type: boolean
